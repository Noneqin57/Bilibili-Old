name: Build & Release

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run tsc

      - name: Build Chrome extension
        run: npm run chrome

      - name: Build Tampermonkey script
        run: npm run tampermonkey

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-old-chrome
          path: dist/
          retention-days: 30

      - name: Upload Tampermonkey artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-old-tampermonkey
          path: tampermonkey/main.user.js
          retention-days: 30

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Chrome extension
        run: npm run chrome

      - name: Build Tampermonkey script
        run: npm run tampermonkey

      - name: Package Chrome extension
        run: cd dist && zip -r ../bilibili-old-chrome.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bilibili-old-chrome.zip
            tampermonkey/main.user.js
